<!doctype html><html lang="en"><head><meta charset="UTF-8"/><link rel="icon"/><meta name="viewport" content="width=device-width,user-scalable=no,initial-scale=1,minimum-scale=1,maximum-scale=1,minimal-ui=true,viewport-fit=cover"/><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black"><meta name="format-detection" content="telephone=no"><meta name="apple-mobile-web-app-title" content=""><link rel="apple-touch-icon-precomposed"><link sizes="114x114" rel="apple-touch-icon-precomposed"><meta content="email=no" name="format-detection"><meta name="renderer" content="webkit"/><meta name="force-rendering" content="webkit"/><meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/><meta name="msapplication-tap-highlight" content="no"><meta name="full-screen" content="yes"/><meta name="x5-fullscreen" content="true"/><meta name="360-fullscreen" content="true"/><meta name="screen-orientation" content="auto"/><meta name="x5-orientation" content="auto"><meta name="x5-page-mode" content="app"><style>.pcConfig{margin:0 auto}body,html{margin:0;padding:0;width:100vw;height:100vh;overflow:hidden}.bg-layer{position:fixed;top:0;left:0;width:100%;height:100%;background:url('./gameimg/img_bg.jpg') no-repeat center center;background-size:cover;z-index:0}#app{width:1920px;min-height:1080px;position:relative;overflow:visible;z-index:1}#scale-root{position:fixed;left:50%;top:50%;transform-origin:center center;transform:translate(-50%,-50%);overflow:visible}#body_loading_spinner{position:fixed;z-index:9999999;width:100vw;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;text-align:center;top:0;left:0;padding-top:0!important;transition:opacity 1s}#top_progress_bar{position:absolute;top:0;left:0;height:.5rem;background:linear-gradient(to right,#aef034,#dbdd55);width:0%;transition:width .2s ease}.progress-bar-image{position:fixed;transform:translateY(-60%) translateX(-50%);top:50%;left:50%;z     // 所有逻辑放到 DOMContentLoaded，不报错
    // ==========================================
    document.addEventListener('DOMContentLoaded', () => {
      const cachedSpinner = document.getElementById('body_loading_spinner');
      let logo = document.getElementById('mypic');
      let loop = document.getElementById('loop');

      // 安全获取
      if(loop) loop.style.display = 'none';

      const base = window.location.pathname.split('/')[1] || '';
      const prefix = base ? `/${base}` : '';
      const params = new URLSearchParams(window.location.search);
      const brandName = params.get('brandName');

      let imgIn = `${prefix}/kf_in.webp`;
      let imgLoop = `${prefix}/kf_loop.webp`;
      if (brandName === 'hy') {
        imgIn = `${prefix}/hy_in.webp`;
        imgLoop = `${prefix}/hy_loop.webp`;
      }

      if(logo) logo.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAP///wAAACH5BAEAAAAALAAAAAABAAEAAAICRAEAOw==';
      if(loop) loop.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAP///wAAACH5BAEAAAAALAAAAAABAAEAAAICRAEAOw==';

      function setLogo() {
        setTimeout(() => {
          if(logo) logo.src = imgIn + '?t=' + Date.now();
          if(loop) loop.src = imgLoop + '?t=' + Date.now();
        }, 50);
      }
      setLogo();

      // 自动关闭
      setTimeout(() => {
        if(loop) loop.style.display = 'block';
        if(logo) logo.style.display = 'none';
        if(cachedSpinner) {
          cachedSpinner.style.opacity = '0';
          setTimeout(() => cachedSpinner.style.display = 'none', 1000);
        }
      }, 20000);

      // ✅ 监听关闭
      if(window.eventBus) {
        window.eventBus.on('hideAppLoading', () => {
          console.log('✅ 关闭 loading');
          if(loop) loop.style.display = 'block';
          if(logo) logo.style.display = 'none';
          if(cachedSpinner) {
            cachedSpinner.style.opacity = '0';
            setTimeout(() => {
              cachedSpinner.style.display = 'none';
            }, 1000);
          }
        });
      }
    });</script><script>console.log('beforeinstallprompt init');

    loadApp();</script><div class="bg-layer"></div><div id="scale-root"><div id="app"></div></div><script>window.addEventListener('load', () => {
      resize();
      const path = window.location.pathname;
      const search = window.location.search;
      if (search && (path === '/30024/' || path.includes('index.html'))) {
        setTimeout(() => {
          history.replaceState({}, '', '/30024/entry' + search);
          window.dispatchEvent(new Event('popstate'));
        }, 60);
      }
    });

    function resize() {
      const designWidth = 1920;
      const winWidth = document.documentElement.clientWidth || document.body.clientWidth;
      let scale = 1;
      const scalefit = winWidth / designWidth;
      if(scalefit < 0.25) scale = scalefit * 3.75;
      const root = document.getElementById('scale-root');
      if(root) root.style.transform = `translate(-50%,-50%) scale(${scale})`;
    }
    resize();
    window.addEventListener('resize', resize);</script></body></html>
